<!DOCTYPE html>
<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>大家になろう ─ 300万円から純資産1億円を目指せ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f2eb;--surface:#fff;--border:#ddd8cc;--text:#2c2820;--muted:#9a9080;--gold:#b8860b;--green:#2d6a4f;--red:#8b2020;--blue:#1a4a7a;--accent:#fdf8ee;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;min-height:100vh;}
#app{max-width:480px;margin:0 auto;padding-bottom:calc(100px + env(safe-area-inset-bottom));}
.topbar{background:var(--text);color:#f5f2eb;padding:12px 14px 10px;position:sticky;top:0;z-index:20;}
.topbar-row1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.gtitle{font-size:16px;font-weight:700;}.dlbl{font-size:11px;opacity:.6;}
.krow{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.kpi{background:rgba(255,255,255,.08);border-radius:4px;padding:6px 8px;}
.klbl{font-size:9px;opacity:.5;margin-bottom:2px;letter-spacing:.04em;}
.kval{font-size:14px;font-weight:700;}
.kval.gold{color:#e6c35a;}.kval.grn{color:#6fcf97;}.kval.wh{color:#fff;}.kval.red{color:#ff7675;}
.krow2{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:3px;}
.kpi2{background:rgba(255,255,255,.05);border-radius:4px;padding:4px 8px;}
.kval2{font-size:11px;font-weight:700;}
.kval2.warn{color:#ffeaa7;}.kval2.ok{color:#6fcf97;}
.savebar{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--accent);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);}
.savebtn{padding:5px 11px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);font-family:'Noto Sans JP',sans-serif;}
.savebtn:hover{background:var(--accent);}.savebtn.dan{border-color:var(--red);color:var(--red);}
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:98px;z-index:15;}
.tab{flex:1;padding:11px 0;text-align:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.on{color:var(--text);border-bottom-color:var(--text);}
.panel{display:none;padding:12px 12px 100px;}.panel.on{display:block;}
.sh{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.pcard{background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;}
.phead{display:flex;justify-content:space-between;align-items:center;padding:9px 12px 8px;border-bottom:1px solid var(--border);background:var(--accent);}
.pname{font-size:13px;font-weight:700;}
.pbadge{font-size:9px;background:var(--text);color:#fff;padding:2px 5px;border-radius:3px;margin-left:4px;}
.peval{font-size:12px;font-weight:700;color:var(--muted);}
.mgmt-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;border-bottom:1px solid var(--border);font-size:10px;}
.mbadge-g{background:#e3f2fd;color:#0d47a1;padding:2px 7px;border-radius:3px;font-weight:700;}
.mbadge-c{background:#e8f5e9;color:#1b5e20;padding:2px 7px;border-radius:3px;font-weight:700;}
.mbadge-s{background:#fff3e0;color:#e65100;padding:2px 7px;border-radius:3px;font-weight:700;}
.trust-bar-wrap{padding:6px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);}
.trust-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.trust-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s;}
.vacancy-bar{background:#e3f2fd;border-top:1px solid #90caf9;padding:6px 12px;font-size:11px;color:#0d47a1;display:flex;justify-content:space-between;}
.arrears-tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;background:#fce4ec;color:#880e4f;font-weight:700;margin-left:5px;vertical-align:middle;}
.arrears-bar{background:#fff5f5;border-top:1px solid #f8bbd0;padding:7px 12px;font-size:11px;color:var(--red);display:flex;justify-content:space-between;align-items:center;}
.mets{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);}
.mt{text-align:center;padding:7px 2px;border-right:1px solid var(--border);}.mt:last-child{border-right:none;}
.mtl{font-size:9px;color:var(--muted);margin-bottom:2px;}.mtv{font-size:12px;font-weight:700;}
.mtv.g{color:var(--green);}.mtv.r{color:var(--red);}.mtv.b{color:var(--blue);}
.occw{padding:7px 12px 5px;}
.occr{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
.occb{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.occf{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}
.occf.mid{background:#e67e22;}.occf.low{background:var(--red);}
.reservew{padding:4px 12px 7px;display:flex;justify-content:space-between;font-size:10px;color:var(--muted);}
.pacts{display:flex;border-top:1px solid var(--border);}
.pabtn{flex:1;padding:9px 0;background:none;border:none;border-right:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.pabtn:last-child{border-right:none;}.pabtn:hover{background:var(--accent);}
.mi{background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;padding:12px;}
.mn{font-size:13px;font-weight:700;margin-bottom:3px;}
.md{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:7px;}
.mnums{display:flex;gap:10px;margin-bottom:7px;flex-wrap:wrap;}
.mnum{font-size:11px;color:var(--muted);}.mnum span{font-size:12px;font-weight:700;color:var(--text);}
.mbot{display:flex;justify-content:space-between;align-items:center;}
.mprice{font-size:16px;font-weight:700;}.brow{display:flex;gap:5px;}
.bb{padding:7px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);font-family:'Noto Sans JP',sans-serif;}
.bb.pri{background:var(--text);color:#fff;border-color:var(--text);}
.bb.blu{background:var(--blue);color:#fff;border-color:var(--blue);}
.bb:disabled{opacity:.3;cursor:not-allowed;}.bb:not(:disabled):hover{opacity:.85;}
.lcard{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
.ltitle{font-size:13px;font-weight:700;margin-bottom:7px;}
.lrow{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}
.lrow:last-of-type{border-bottom:none;}.ll{color:var(--muted);}
.lv{font-weight:700;}.lv.r{color:var(--red);}.lv.g{color:var(--green);}.lv.b{color:var(--blue);}
.logitem{display:flex;gap:7px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;line-height:1.5;}
.licon{flex-shrink:0;font-size:14px;}.ltxt{color:var(--muted);}.ltxt strong{color:var(--text);}
.ldate{font-size:10px;color:var(--muted);margin-right:4px;}
.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);padding:10px 12px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--border);}
.advbtn{width:100%;padding:14px;background:var(--text);color:var(--bg);border:none;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.advbtn:hover{opacity:.85;}.advbtn.danger{background:var(--red);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.ov.hid{display:none;}
.mdl{background:#fff;border-radius:14px 14px 0 0;padding:22px 16px 26px;width:100%;max-width:480px;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.mdltitle{font-size:15px;font-weight:700;margin-bottom:7px;}
.mdlbody{font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:16px;}
.mdlbody strong{color:var(--text);}
.mdlbtns{display:flex;gap:8px;flex-wrap:wrap;}
.mb{flex:1;min-width:80px;padding:11px 8px;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--accent);color:var(--text);text-align:center;}
.mb.pri{background:var(--text);color:#fff;border-color:var(--text);}
.mb.dan{background:var(--red);color:#fff;border-color:var(--red);}
.mb:hover{opacity:.85;}
.tst{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:100;white-space:nowrap;max-width:320px;text-align:center;}
.tst.hid{display:none;}
.rank{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;margin-left:4px;}
.rF{background:#fce4ec;color:#880e4f;}.rE{background:#e0e0e0;color:#555;}.rD{background:#c8e6c9;color:var(--green);}
.rC{background:#bbdefb;color:var(--blue);}.rB{background:#fff9c4;color:#8b6914;}.rA{background:#ffe0b2;color:#8b4513;}.rS{background:#f8bbd0;color:#880e4f;}
.empty{text-align:center;padding:28px 16px;color:var(--muted);font-size:13px;line-height:1.8;}
.etag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700;margin-left:4px;vertical-align:middle;}
.etag.ten{background:#fce4ec;color:#880e4f;}.etag.bld{background:#e3f2fd;color:#0d47a1;}.etag.ext{background:#e8f5e9;color:#1b5e20;}
/* ── F2P: ボトムバー2段 ── */
.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);padding:8px 12px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--border);}
.bottom-row1{display:flex;gap:6px;margin-bottom:6px;}
.advbtn-sub{flex:1;padding:10px 0;background:#fff;color:var(--text);border:1.5px solid var(--gold);border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-align:center;}
.advbtn-sub.locked{background:var(--accent);color:var(--muted);border-color:var(--border);cursor:pointer;}
.advbtn-sub.gold{background:linear-gradient(135deg,#b8860b,#e6c35a);color:#fff;border-color:#b8860b;}
/* ── F2P: 課金プランモーダル ── */
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.plan-card{border:1.5px solid var(--border);border-radius:10px;padding:12px 10px;text-align:center;cursor:pointer;transition:all .15s;background:#fff;}
.plan-card:hover{border-color:var(--gold);background:var(--accent);}
.plan-card.featured{border-color:var(--gold);background:linear-gradient(135deg,#fffbf0,#fff8e8);}
.plan-icon{font-size:24px;margin-bottom:4px;}
.plan-name{font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px;}
.plan-price{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:4px;}
.plan-desc{font-size:9px;color:var(--muted);line-height:1.5;}
.plan-badge{font-size:8px;background:var(--gold);color:#fff;padding:1px 6px;border-radius:10px;display:inline-block;margin-bottom:5px;}
/* ── F2P: セーブスロット ── */
.slot-grid{display:flex;flex-direction:column;gap:6px;margin:8px 0;}
.slot-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.slot-num{font-size:10px;color:var(--muted);font-weight:700;min-width:20px;}
.slot-info{flex:1;font-size:12px;}
.slot-date{font-size:10px;color:var(--muted);}
.slot-lock{font-size:16px;opacity:.4;}
.slot-btn{padding:5px 10px;border-radius:4px;font-size:10px;font-weight:700;border:1px solid var(--border);background:var(--accent);cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.slot-btn.pri{background:var(--text);color:#fff;border-color:var(--text);}
.slot-btn.gold{background:var(--gold);color:#fff;border-color:var(--gold);}
/* ── F2P: 称号タブ ── */
.title-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:4px;}
.title-card{border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;background:#fff;}
.title-card.unlocked{border-color:var(--gold);background:var(--accent);}
.title-card.locked{opacity:.5;}
.title-icon{font-size:20px;margin-bottom:3px;}
.title-name{font-size:11px;font-weight:700;margin-bottom:2px;}
.title-cond{font-size:9px;color:var(--muted);}
.title-owned{font-size:9px;color:var(--gold);font-weight:700;margin-top:3px;}
/* ── F2P: スタミナ表示 ── */
.stamina-bar-wrap{padding:4px 12px 0;display:flex;align-items:center;gap:6px;}
.stamina-label{font-size:9px;color:var(--muted);white-space:nowrap;}
.stamina-bar{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.stamina-fill{height:100%;background:#e6c35a;border-radius:2px;transition:width .4s;}
.stamina-val{font-size:9px;color:#e6c35a;font-weight:700;white-space:nowrap;}
/* ── 田中さん（NPC）セリフ ── */
.tanaka-wrap{display:flex;gap:8px;align-items:flex-start;padding:8px 12px;background:#f0f4ff;border-top:1px solid #c8d4f0;margin-bottom:2px;}
.tanaka-icon{width:26px;height:26px;border-radius:50%;background:#1a4a7a;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.tanaka-bubble{flex:1;}
.tanaka-name{font-size:9px;color:#1a4a7a;font-weight:700;margin-bottom:2px;}
.tanaka-text{font-size:11px;color:#2c2820;line-height:1.6;background:#fff;border:1px solid #c8d4f0;border-radius:0 8px 8px 8px;padding:6px 10px;}
.danger-banner{background:#fff5f5;border:1px solid #ffaaaa;border-radius:6px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--red);line-height:1.5;font-weight:700;}
.info-card{background:var(--accent);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.6;}
.proposal-card{background:linear-gradient(135deg,#fffbf0,#fff8e8);border:1.5px solid #c9a84c;border-radius:8px;margin-bottom:8px;overflow:hidden;}
.proposal-head{padding:10px 12px 8px;border-bottom:1px solid #e8d5a0;display:flex;justify-content:space-between;align-items:flex-start;}
.proposal-from{font-size:10px;color:#8b6914;font-weight:700;margin-bottom:3px;}
.proposal-title{font-size:14px;font-weight:700;color:#5c4000;}
.proposal-badge{font-size:9px;background:var(--gold);color:#fff;padding:3px 8px;border-radius:3px;font-weight:700;}
.proposal-body{padding:10px 12px;}
.proposal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px;}
.pstat{text-align:center;background:rgba(255,255,255,.7);border-radius:4px;padding:6px 4px;}
.pstat-l{font-size:9px;color:#8b6914;margin-bottom:2px;}
.pstat-v{font-size:13px;font-weight:700;color:#5c4000;}
.pstat-v.good{color:var(--green);}
.proposal-lock{text-align:center;padding:10px 12px 12px;background:rgba(184,134,11,.06);border-top:1px solid #e8d5a0;}
.lock-msg{font-size:12px;color:#8b6914;margin-bottom:8px;line-height:1.5;}
.unlock-btn-gold{width:100%;padding:11px;background:var(--gold);color:#fff;border:none;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.unlock-btn-gold:hover{opacity:.85;}
.trust-panel{background:#fffdf5;border:1px solid #c9a84c;border-radius:8px;padding:12px;margin-bottom:10px;}
.trust-panel-title{font-size:12px;font-weight:700;color:#5c4000;margin-bottom:8px;}
.trust-route{font-size:11px;color:#8b6914;margin-bottom:8px;}
.trust-route-done{color:var(--green);font-weight:700;}
.check{display:inline-block;width:14px;height:14px;border-radius:3px;border:1px solid #c9a84c;text-align:center;line-height:14px;font-size:9px;background:#fff;margin-right:4px;}
.check.done{background:var(--green);border-color:var(--green);color:#fff;}
.mgmt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0 4px;}
.mgmt-opt{border:1px solid var(--border);border-radius:6px;padding:10px 6px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.mgmt-opt:hover{border-color:var(--text);}
.mgmt-opt.sel-g{border:2px solid #1565c0;background:#e3f2fd;}
.mgmt-opt.sel-c{border:2px solid #2e7d32;background:#e8f5e9;}
.mgmt-opt.sel-s{border:2px solid #e65100;background:#fff3e0;}
.mopt-name{font-size:11px;font-weight:700;margin-bottom:4px;}
.mopt-rate{font-size:18px;font-weight:700;margin-bottom:4px;}
.mopt-rate.g{color:#1565c0;}.mopt-rate.c{color:#2e7d32;}.mopt-rate.s{color:#e65100;}
.mopt-tag{font-size:9px;padding:2px 6px;border-radius:3px;margin-bottom:5px;display:inline-block;}
.mopt-tag.g{background:#e3f2fd;color:#0d47a1;}.mopt-tag.c{background:#e8f5e9;color:#1b5e20;}.mopt-tag.s{background:#fff3e0;color:#e65100;}
.mopt-desc{font-size:9px;color:var(--muted);line-height:1.4;}
.pacts-toggle{width:100%;padding:9px 12px;background:none;border:none;border-top:1px solid var(--border);font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;display:flex;justify-content:space-between;align-items:center;}
.pacts-toggle:hover{background:var(--accent);}
.pacts-body{display:none;border-top:1px solid var(--border);}
.pacts-body.open{display:block;}
.log-filter{padding:4px 10px;font-size:11px;font-weight:700;border-radius:20px;background:#fff;color:var(--muted);border:1px solid var(--border);cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.log-filter.on{background:var(--text);color:#fff;border-color:var(--text);}
.log-filter:hover{opacity:.8;}
.premium-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:3px;font-weight:700;background:var(--gold);color:#fff;margin-left:5px;vertical-align:middle;}
.premium-divider{display:flex;align-items:center;gap:8px;margin:4px 0 10px;font-size:10px;color:#b8973a;font-weight:700;}
.premium-divider::before,.premium-divider::after{content:'';flex:1;height:1px;background:#c9a84c;opacity:.4;}
.unlock-btn{padding:9px 22px;background:var(--gold);color:#fff;border:none;border-radius:5px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.unlock-btn:hover{opacity:.85;}
</style>
</head>
<body>
<div id="app">
<div class="topbar">
  <div class="topbar-row1"><div class="gtitle">大家になろう<span style="font-size:9px;font-weight:400;color:var(--muted);margin-left:6px">300万円から純資産1億円を目指せ</span></div><div class="dlbl" id="dl">2025年1月</div></div>
  <div class="krow">
    <div class="kpi"><div class="klbl">手持ち資金</div><div class="kval gold" id="kc">¥300万</div></div>
    <div class="kpi"><div class="klbl">月次CF</div><div class="kval grn" id="km">±0</div></div>
    <div class="kpi"><div class="klbl">純資産</div><div class="kval wh" id="ka">¥300万</div></div>
  </div>
  <div class="krow2">
    <div class="kpi2"><div class="klbl">修繕積立</div><div class="kval2 ok" id="k-reserve">¥0</div></div>
    <div class="kpi2"><div class="klbl">借入残高</div><div class="kval2 warn" id="k-debt">¥0</div></div>
    <div class="kpi2"><div class="klbl">目標達成</div><div class="kval2" id="k-goal" style="color:#e6c35a">0%</div></div>
  </div>
  <div class="stamina-bar-wrap" id="stamina-wrap">

  toast('💾 スロット'+(i+1)+'にセーブしました');}catch(e){toast('セーブ失敗');}}

function calcLoanLimit(){

  },0);

}

  document.getElementById('tax-content').innerHTML=`<div class="info-card" style="display:flex;gap:12px"><div style="flex:1"><div style="font-size:10px;color:var(--muted);margin-bottom:4px">修繕積立金プール</div><div style="font-size:18px;font-weight:700;margin-bottom:4px">${fmt(G.reserve)}</div><div style="font-size:11px;color:var(--muted)">月次積立：${fmt(calcMonthlyReserve())}　修繕・故障時に自動充当</div></div><div style="flex:1;border-left:1px solid var(--border);padding-left:12px"><div style="font-size:10px;color:var(--muted);margin-bottom:4px">純資産</div><div style="font-size:18px;font-weight:700;margin-bottom:4px;color:${na>=0?'var(--green)':'var(--red)'}">${fmt(na)}</div><div style="font-size:11px;color:var(--muted)">目標まで：${fmt(Math.max(0,100000000-na))}</div><div style="font-size:10px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);line-height:1.7">現金 + 積立 + 物件評価額<br>− 借入残高</div></div></div><div class="lcard"><div class="ltitle">借入・資産状況</div><div class="lrow"><span class="ll">借入残高合計</span><span class="lv r">${fmt(G.debt)}</span></div><div class="lrow"><span class="ll">月次返済（ローン）</span><span class="lv r">${fmt(G.props.reduce((s,p)=>s+(p.loan?Math.min(p.loan.mo,p.loan.rem):0),0))}</span></div><div class="lrow"><span class="ll">月次積立</span><span class="lv r">${fmt(calcMonthlyReserve())}</span></div><div class="lrow"><span class="ll">固定資産税（月割）</span><span class="lv r">${fmt(calcMonthlyTax())}</span></div><div class="lrow"><span class="ll">月次手出し合計</span><span class="lv r">${fmt(G.props.reduce((s,p)=>s+(p.loan?Math.min(p.loan.mo,p.loan.rem):0),0)+calcMonthlyReserve()+calcMonthlyTax())}</span></div><div class="lrow"><span class="ll">手持ち資金</span><span class="lv ${G.cash<0?'r':''}">${fmt(G.cash)}</span></div><div class="lrow"><span class="ll">純資産</span><span class="lv ${na<0?'r':'g'}">${fmt(na)}</span></div></div><div class="lcard"><div class="ltitle">💡 実質CFの計算式</div><div style="font-size:12px;color:var(--muted);line-height:2;padding:4px 0"><span style="color:var(--green);font-weight:700">収入</span>　家賃 × 稼働率 × 管理手数料控除後<br><span style="color:var(--red);font-weight:700">− 返済</span>　毎月のローン返済額<br><span style="color:var(--red);font-weight:700">− 積立</span>　修繕積立金（建物価格 × 積立率 ÷ 12）<br><span style="color:var(--red);font-weight:700">− 税金</span>　固定資産税（評価額 × 1.4% ÷ 12）<br><span style="color:var(--blue);font-weight:700;font-size:13px">＝ 実質CF</span>　手元に残る実質的な月収</div><div style="font-size:10px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;margin-top:4px">管理手数料：集金管理5%　自主管理0%<br>修繕積立率：物件種類により異なる（築古15%〜新築7%）</div></div>${G.cash<0&&netAsset()<0?`<div class="danger-banner">⚠️ 純資産がマイナス継続中（${G.negMonths}ヶ月目）。あと${3-G.negMonths}ヶ月で破産します。</div>`:G.cash<0?`<div class="danger-banner" style="background:#fff8e1;border-color:#ffe082;color:#8b6914">⚠️ 手持ち資金がマイナスです。純資産はプラスのため破産しません。</div>`:''}`;
  renderLog();
  updateBottomBar();
}
function showTutorial(){
  const steps=[
    {title:'🌅 大家になろう',body:`初期資金 <strong>¥300万円</strong> で不動産経営をスタート。<br><br>目標は<strong>4棟以上保有した状態で純資産1億円</strong>です。物件を買って家賃収入を積み上げていきましょう。<br><br>各物件は<strong>1棟ずつしか購入できません</strong>。どの物件を選ぶか、戦略が重要です。管理会社との信頼を積み上げると非公開の優良物件を紹介してもらえます。`},
    {title:'🏚️ まず築古アパートを買おう',body:`「物件市場」タブから<strong>築古アパート（¥90万）</strong>を購入しましょう。<br><br>初期資金で現金購入できる唯一の物件です。家賃収入を積み上げて次の物件の頭金を貯めましょう。<br><br>購入時は<strong>集金管理型</strong>がおすすめです。信頼を積み上げると特別な物件を紹介してもらえます。`},
    {title:'💡 お金の流れを理解しよう',body:`毎月「▶ 1ヶ月進める」を押すと収支が計算されます。<br><br><strong>実質CF</strong>＝月収入 − ローン返済 − 修繕積立<br><br>修繕積立は「財務」タブで確認できます。イベントが発生した際に自動で充当されます。`},
    {title:'⚡ イベントに備えよう',body:`毎月ランダムでトラブルや好機が発生します。<br><br>・騒音クレーム・給湯器故障・雨漏りなど<br>・近隣再開発・SNSで話題になるなどプラスも<br><br>築古アパートは<strong>イベント発生率が高め</strong>です。積立プールを切らさないようにしましょう。`},
  ];
  let step=0;
  const show=()=>{
    const s=steps[step];
    const isLast=step===steps.length-1;
    modal(s.title,`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">${step+1} / ${steps.length}</div>${s.body}`,[
      ...(step>0?[{l:'← 前へ',f:()=>{step--;show();}}]:[]),
      isLast?{l:'はじめる！',c:'pri',f:()=>{sw('market');}}:{l:'次へ →',c:'pri',f:()=>{step++;show();}},
    ]);
  };
  show();
}
resetGameState();
checkExistingSave();
if(!localStorage.getItem(SAVE_SLOTS[0])){showTutorial();}
</script>
